<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>أنت غير متصل بالإنترنت</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        font-family: "IBM Plex Sans Arabic", "Cairo", sans-serif;
        background: #0a0b10;
        color: #fff;
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        padding: 2rem;
      }
      .container {
        text-align: center;
        max-width: 400px;
      }
      .icon {
        font-size: 4rem;
        margin-bottom: 1.5rem;
        opacity: 0.6;
      }
      h1 {
        font-size: 1.5rem;
        font-weight: 900;
        margin-bottom: 0.75rem;
      }
      p {
        color: #999;
        font-size: 0.95rem;
        line-height: 1.7;
        margin-bottom: 2rem;
      }
      button {
        background: #f43f5e;
        color: #fff;
        border: none;
        padding: 0.75rem 2rem;
        border-radius: 0.75rem;
        font-size: 1rem;
        font-weight: 700;
        cursor: pointer;
        font-family: inherit;
      }
      button:hover {
        opacity: 0.9;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="icon">📡</div>
      <h1>أنت غير متصل بالإنترنت</h1>
      <p>
        تأكد من اتصالك بالإنترنت ثم حاول مرة أخرى. سيتم تحميل الصفحة تلقائياً
        عند عودة الإتصال.
      </p>
      <button onclick="window.location.reload()">إعادة المحاولة</button>
    </div>
    <script>
      window.addEventListener("online", () => window.location.reload());
    </script>
  </body>
</html>
